resourceRegistration: dp
useNFDLabeling: false
resourceMonitoring: true
prometheusIntegration: false
enableKueue: false

logLevel: 1

health:
  coreTemperatureThreshold: 88
  memoryTemperatureThreshold: 99
  checkIntervalSeconds: 12

dp:
  plugin: docker.io/intel/intel-gpu-plugin:0.36.0@sha256:2db679be62b52ac985169084ca711cab6e6c59fe543ab2ddee58163d6f8d29e0
  logLevel: 2
  byPathMode: single

dra:
  image: ghcr.io/intel/intel-resource-drivers-for-kubernetes/intel-gpu-resource-driver:v0.11.0@sha256:49f38fcbee4f98d748b537b1a728a12f39e56fd208c86dc3fa32ab2162c21197
  logLevel: 2
  podHealthCheck: true
  manageBinding: false

xpu:
  image: ghcr.io/intel/xpumanager/xpumd:v2.0.0@sha256:bd6bad4f95274832ce6863c6f7744fc73a610903617d9def2932588138be0b85
  logLevel: 2
  monitoringResource: monitoring
  configMapOverride: ""

kueue:
  equalResources:
    - name: gpu-cluster-queue
      localQueues:
      - name: gpu-queue
        namespace: default

