---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: clusterpolicies.intel.com
spec:
  group: intel.com
  names:
    kind: ClusterPolicy
    listKind: ClusterPolicyList
    plural: clusterpolicies
    singular: clusterpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.devicePluginStatus
      name: DP
      type: string
    - jsonPath: .status.draStatus
      name: DRA
      type: string
    - jsonPath: .status.xpuManagerStatus
      name: XPU
      type: string
    - jsonPath: .status.kmmStatus
      name: KMM
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterPolicy is the Schema for the clusterpolicies API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterPolicySpec defines the desired state of ClusterPolicy.
            properties:
              dp:
                description: DevicePluginSpec defines the desired state of DevicePlugin.
                properties:
                  allowIDs:
                    description: |-
                      AllowIDs and DenyIDs are used to control which devices are registered as resources.
                      Allow or deny certain PCI Device IDs. Both cannot be used together. Format is '0xabcd'.
                    items:
                      type: string
                    type: array
                  byPathMode:
                    description: ByPathMode controls DRI by-path entries are exposed
                      by the plugin.
                    enum:
                    - single
                    - all
                    - none
                    type: string
                  denyIDs:
                    items:
                      type: string
                    type: array
                  levelzero:
                    description: |-
                      Container image for the Level Zero companion container
                      Deprecated: LevelzeroImage is no longer used and this configuration item will be removed in the future.
                    type: string
                  logLevel:
                    format: int32
                    type: integer
                  plugin:
                    description: Container image for the GPU plugin
                    type: string
                type: object
              dra:
                description: DynamicResourceAllocationSpec defines the desired state
                  of DynamicResourceAllocation.
                properties:
                  image:
                    type: string
                  logLevel:
                    format: int32
                    type: integer
                  manageBinding:
                    description: |-
                      Allow DRA plugin to bind/unbind devices from xe/i915 driver to vfio/xe-vfio driver and back.
                      Needed if cluster is supposed to support dynamic switching from drivers. Not needed, if hosts are
                      preconfigured to either target KubeVirt or normal workloads.
                    type: boolean
                  podHealthCheck:
                    default: true
                    description: Enable DRA Pod's health check.
                    type: boolean
                type: object
              enableKueue:
                description: Set up Kueue queues for node resources
                type: boolean
              health:
                description: |-
                  Enable health monitoring in DP/DRA
                  These values are applied to all the Intel GPU devices in the cluster.
                  Mechanism to monitor the values differ between DP and DRA. DP uses LevelZero API
                  directly, while DRA relies on the health status provided by XPU Manager.
                properties:
                  checkIntervalSeconds:
                    default: 5
                    description: Not supported by Device Plugin
                    format: int32
                    maximum: 3600
                    minimum: 1
                    type: integer
                  coreTemperatureThreshold:
                    default: 100
                    format: int32
                    maximum: 130
                    minimum: 1
                    type: integer
                  memoryTemperatureThreshold:
                    default: 100
                    format: int32
                    maximum: 130
                    minimum: 1
                    type: integer
                type: object
              kernelModule:
                description: |-
                  KernelModule configures out-of-tree kernel module loading via KMM.
                  When set, KMM loads the specified OOT driver module on each node.
                  When nil, the in-tree kernel driver is used.
                properties:
                  firmwarePath:
                    description: FirmwarePath is the in-container path where firmware
                      files are stored.
                    type: string
                  image:
                    description: |-
                      Image is the default container image for the OOT driver module.
                      When KernelMappings is empty, generates a single wildcard mapping.
                      When KernelMappings is non-empty, serves as the KMM-level fallback
                      for mappings that omit ContainerImage.
                    type: string
                  inTreeModulesToRemove:
                    description: |-
                      InTreeModulesToRemove lists in-tree modules to unload before
                      inserting the OOT module. ModuleName is always included implicitly.
                    items:
                      type: string
                    type: array
                  kernelMappings:
                    description: |-
                      KernelMappings maps kernel version patterns to container images or
                      build specifications. Translates directly to KMM KernelMapping
                      objects. When empty, a single wildcard mapping (regexp "^.+$") is
                      generated from Image.
                    items:
                      description: |-
                        KernelMappingSpec maps a kernel version pattern to a container image
                        or build specification.
                      properties:
                        build:
                          description: |-
                            Build configures in-cluster building of the driver image via KMM.
                            When set, KMM builds the image if it doesn't exist in the registry.
                          properties:
                            buildArgs:
                              description: BuildArgs are key-value pairs passed to
                                the image builder.
                              items:
                                description: BuildArg is a key-value pair passed as
                                  a build argument.
                                properties:
                                  name:
                                    type: string
                                  value:
                                    type: string
                                required:
                                - name
                                - value
                                type: object
                              type: array
                            dockerfileConfigMap:
                              description: DockerfileConfigMap references a ConfigMap
                                containing the Dockerfile.
                              properties:
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                              type: object
                              x-kubernetes-map-type: atomic
                            secrets:
                              description: |-
                                Secrets are made available during the build (e.g., for private
                                source repos). Not for registry auth -- use pullSecret on
                                ClusterPolicySpec.
                              items:
                                description: |-
                                  LocalObjectReference contains enough information to let you locate the
                                  referenced object inside the same namespace.
                                properties:
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                type: object
                                x-kubernetes-map-type: atomic
                              type: array
                          required:
                          - dockerfileConfigMap
                          type: object
                        containerImage:
                          description: |-
                            ContainerImage is the full image reference for this kernel version.
                            Required when Build is nil and no parent-level Image is set.
                          type: string
                        inTreeModulesToRemove:
                          description: |-
                            InTreeModulesToRemove overrides the parent-level list for this
                            specific kernel mapping.
                          items:
                            type: string
                          type: array
                        literal:
                          description: |-
                            Literal is an exact kernel version string to match.
                            Exactly one of Regexp or Literal must be set.
                          type: string
                        regexp:
                          description: |-
                            Regexp is a regular expression matched against node kernel versions.
                            Exactly one of Regexp or Literal must be set.
                          type: string
                      type: object
                    type: array
                  moduleName:
                    description: |-
                      ModuleName is the kernel module to load (e.g., "xe").
                      Also used as the default InTreeModulesToRemove entry.
                    type: string
                  modulesLoadingOrder:
                    description: |-
                      ModulesLoadingOrder specifies softdep-style loading order for
                      multi-module drivers. First element must be ModuleName; KMM loads
                      in order and unloads in reverse. Must have >=2 entries if set.
                    items:
                      type: string
                    type: array
                  skipTLSVerify:
                    description: |-
                      SkipTLSVerify disables TLS certificate verification when pulling
                      OOT driver images. For air-gapped or internal registries.
                    type: boolean
                required:
                - moduleName
                type: object
              kueue:
                description: Define Kueue queues
                properties:
                  equalResources:
                    description: Cluster queues for dividing resources evenly
                    items:
                      description: ClusterQueueSpec defines a Kueue ClusterQueues
                      properties:
                        localQueues:
                          description: List of Kueue LocalQueues to create for this
                            ClusterQueue
                          items:
                            description: LocalQueueSpec defines a Kueue Local Queue
                            properties:
                              name:
                                description: Name of the cluster queue
                                type: string
                              namespace:
                                description: Namespace for the local queue
                                type: string
                            required:
                            - name
                            - namespace
                            type: object
                          type: array
                        name:
                          description: Name of the cluster queue
                          type: string
                      required:
                      - localQueues
                      - name
                      type: object
                    type: array
                required:
                - equalResources
                type: object
              logLevel:
                description: LogLevel to overwrite the default log level of the components.
                format: int32
                type: integer
              nodeSelector:
                additionalProperties:
                  type: string
                type: object
              prometheusIntegration:
                description: Deploy Kubernetes components to integrate with Prometheus.
                type: boolean
              pullSecret:
                description: Pull secret is shared with all the deployments.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              resourceMonitoring:
                description: |-
                  To enable resource monitoring via XPU or not. Deploys GPU Plugin or DRA with monitoring enabled and
                  XPU Manager DaemonSet if true.
                type: boolean
              resourceRegistration:
                description: 'Which type of resource registration is to be used: Device
                  plugin (dp) or Dynamic Resource Allocation (dra).'
                enum:
                - dp
                - dra
                type: string
              tolerations:
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
              useNFDLabeling:
                description: Use NFD rule to label nodes.
                type: boolean
              xpu:
                description: XpuManagerSpec defines the desired state of XpuManager.
                properties:
                  configMapOverride:
                    description: |-
                      ConfigMapOverride allows overriding the default OpenTelemetry Collector configuration used by XPU Manager.
                      Configmap has to be in the same namespace as the operator and contain a key "config.yaml" with the configuration content.
                      The value should be a YAML string containing the configuration. If not set, a default configuration will be used.
                    type: string
                  image:
                    type: string
                  logLevel:
                    format: int32
                    type: integer
                  monitoringResource:
                    description: |-
                      Set monitoring resource name for Device Plugin use. If not set, the default resource
                      name "gpu.intel.com/monitoring" will be used.
                    enum:
                    - i915_monitoring
                    - xe_monitoring
                    - monitoring
                    type: string
                type: object
            required:
            - resourceRegistration
            type: object
          status:
            description: ClusterPolicyStatus defines the observed state of ClusterPolicy.
            properties:
              devicePluginStatus:
                type: string
              draStatus:
                type: string
              errors:
                items:
                  type: string
                type: array
              kmmStatus:
                type: string
              xpuManagerStatus:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
