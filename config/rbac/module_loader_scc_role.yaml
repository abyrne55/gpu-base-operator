apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: intel-gpu-module-loader-scc-role
  labels:
    app.kubernetes.io/name: intel-gpu-base-operator
rules:
- apiGroups: ["security.openshift.io"]
  resources: ["securitycontextconstraints"]
  # Hardcoded with kustomize namePrefix — kustomize does not transform resourceNames values.
  resourceNames: ["intel-gpu-base-operator-intel-gpu-module-loader-scc"]
  verbs: ["use"]
